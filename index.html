<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRM Business - Система управления</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { cursor: pointer; border: none; transition: 0.3s; }
        .add-btn { background-color: #28a745; color: white; grid-column: span 2; }
        .add-btn:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .edit { background-color: #ffc107; color: black; margin-right: 5px; }
        .delete { background-color: #dc3545; color: white; }
        .edit:hover { background-color: #e0a800; }
        .delete:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h2>CRM Система - Учет клиентов</h2>
    
    <form id="crmForm">
        <input type="text" id="name" placeholder="ФИО клиента" required>
        <input type="text" id="phone" placeholder="Номер телефона" required>
        <input type="text" id="service" placeholder="Услуга" required>
        <select id="status">
            <option value="В ожидании">В ожидании</option>
            <option value="В процессе">В процессе</option>
            <option value="Завершено">Завершено</option>
        </select>
        <button type="submit" class="add-btn">Добавить / Обновить запись</button>
    </form>

    <table id="customerTable">
        <thead>
            <tr>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Услуга</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // Загружаем данные из локального хранилища браузера
    let data = JSON.parse(localStorage.getItem('crmData')) || [];

    // Функция для отрисовки таблицы
    function renderTable() {
        const tbody = document.querySelector('#customerTable tbody');
        tbody.innerHTML = '';

        data.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.name}</td>
                <td>${item.phone}</td>
                <td>${item.service}</td>
                <td>${item.status}</td>
                <td>
                    <button class="edit" onclick="editRow(${index})">Изменить</button>
                    <button class="delete" onclick="deleteRow(${index})">Удалить</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // Функция сохранения в память браузера
    function saveData() {
        localStorage.setItem('crmData', JSON.stringify(data));
    }

    // Функция удаления
    function deleteRow(index) {
        if (confirm('Вы уверены, что хотите удалить этого клиента?')) {
            data.splice(index, 1);
            saveData();
            renderTable();
        }
    }

    // Функция редактирования (заполняет форму данными для правки)
    function editRow(index) {
        const item = data[index];
        document.getElementById('name').value = item.name;
        document.getElementById('phone').value = item.phone;
        document.getElementById('service').value = item.service;
        document.getElementById('status').value = item.status;

        // Удаляем запись из списка, чтобы при нажатии "Добавить" она не дублировалась, а обновилась
        data.splice(index, 1);
    }

    // Обработка отправки формы
    document.getElementById('crmForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const newEntry = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            service: document.getElementById('service').value,
            status: document.getElementById('status').value
        };

        data.push(newEntry);
        saveData();
        renderTable();
        this.reset(); // Очистить поля формы
    });

    // Запускаем таблицу при загрузке страницы
    renderTable();
</script>

</body>
</html>
